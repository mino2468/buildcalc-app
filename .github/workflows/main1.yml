name: Build Android APK (Expo Monorepo pnpm 9)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4 # Zmiana na v4
        with:
          version: 9 # KONIECZNE: Wersja 9 obsługuje "catalog:"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Zalecane Node 20 dla pnpm 9
          cache: 'pnpm'

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Prebuild Expo
        # JEŚLI TWOJA APKA JEST W FOLDERZE, DOPISZ TU ŚCIEŻKĘ, NP: cd apps/mobile && pnpm exec...
        run: pnpm exec expo prebuild --platform android --no-install

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MojaApka-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
