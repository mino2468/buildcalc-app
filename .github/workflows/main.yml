name: Build Android APK (Expo Monorepo)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Detect App Directory and Prebuild
        run: |
          # Szukamy folderu, w którym jest app.json (omijając node_modules)
          APP_PATH=$(find . -name "app.json" -not -path "*/node_modules/*" -exec dirname {} \; | head -n 1)
          echo "Znaleziono aplikację w: $APP_PATH"
          echo "APP_DIR=$APP_PATH" >> $GITHUB_ENV
          
          cd $APP_PATH
          # Używamy npx, który wewnątrz pnpm monorepo lepiej radzi sobie ze ścieżkami
          npx expo prebuild --platform android --no-install

      - name: Build Debug APK
        run: |
          cd ${{ env.APP_DIR }}/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MojaApka-APK
          # Szukamy pliku APK dynamicznie, bo ścieżka w monorepo może być inna
          path: "**/build/outputs/apk/debug/app-debug.apk"
