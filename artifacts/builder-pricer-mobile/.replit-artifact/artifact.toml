kind = "mobile"
previewPath = "/mobile/"
title = "BuildCalc – Wycena Robót"
version = "1.0.0"
id = "artifacts/builder-pricer-mobile"
router = "expo-domain"

[[services]]
name = "expo"
ensurePreviewReachable = "/status"
paths = [ "/mobile/" ]
localPort = 23816

[services.development]
run = "pnpm --filter @workspace/builder-pricer-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/builder-pricer-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/builder-pricer-mobile", "run", "serve" ]

[services.env]
PORT = "23816"
BASE_PATH = "/mobile/"
