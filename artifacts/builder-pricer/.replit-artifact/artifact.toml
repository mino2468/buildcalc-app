kind = "web"
previewPath = "/"
title = "Builder Pricer"
version = "1.0.0"
id = "artifacts/builder-pricer"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20669

[services.development]
run = "pnpm --filter @workspace/builder-pricer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/builder-pricer", "run", "build" ]
serve = "static"
publicDir = "artifacts/builder-pricer/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20669"
BASE_PATH = "/"
